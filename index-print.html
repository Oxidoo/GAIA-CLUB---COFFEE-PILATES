<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAIA — The Art of Balance | PDF</title>
  <meta name="description" content="GAIA Club — Pilates, Yoga & Coffee Shop au cœur du 12e arrondissement de Paris." />
  <link rel="stylesheet" href="styles.css" />
  
  <style>
    @media print {
      @page {
        size: A4;
        margin: 0;
        padding: 0;
      }
      
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      body {
        background: white;
        color: #30120A;
      }

      /* Hide nav & footer for cleaner PDF */
      header.nav,
      footer.footer,
      .mobile-menu {
        display: none !important;
      }

      /* Each major section on its own page */
      .page-root > section {
        break-after: page;
        page-break-after: always;
        margin: 0;
        padding: 40px;
        min-height: 100vh;
        box-sizing: border-box;
      }

      .page-root > section:last-child {
        break-after: avoid;
        page-break-after: avoid;
      }

      /* Hero section full page */
      .hero {
        min-height: 100vh !important;
        padding: 60px 40px !important;
        display: flex;
        align-items: flex-end;
        background: linear-gradient(180deg, rgba(48,18,10,0.7), rgba(48,18,10,0.95)) !important;
        color: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .hero-bg {
        display: none;
      }

      .hero-title {
        font-size: 88px !important;
        line-height: 0.9 !important;
        color: #FFEC99 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .hero-meta {
        color: #FFEC99;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* Marquee not needed in print */
      .marquee {
        display: none !important;
      }

      /* Intro section */
      .intro {
        background: white !important;
        padding: 60px 40px !important;
      }

      .intro h2 {
        font-size: 52px !important;
        line-height: 1.2 !important;
      }

      .intro-stats {
        grid-template-columns: repeat(2, 1fr);
        gap: 32px;
        margin-top: 40px;
      }

      /* Cours grid */
      .cours-section {
        background: #F7F4EF !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .cours-grid {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 20px;
      }

      .cours-card {
        aspect-ratio: 3/4 !important;
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .cours-card img {
        display: block !important;
      }

      /* Banner sections */
      .banner {
        grid-template-columns: 1fr !important;
      }

      .banner-img {
        min-height: 300px;
        display: block;
        break-inside: avoid;
      }

      .banner-img img {
        width: 100%;
        height: 300px;
        object-fit: cover;
      }

      .banner-content {
        background: rgba(251, 250, 245, 1) !important;
        padding: 40px !important;
      }

      /* Shop section */
      .shop-mosaic {
        background: #F7F4EF !important;
      }

      .shop-grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      .shop-card {
        aspect-ratio: 3/4 !important;
        break-inside: avoid;
        border-radius: 10px !important;
      }

      .shop-card img {
        display: block !important;
        width: min(381px, 100%) !important;
        border-radius: 10px !important;
        overflow: visible !important;
        color: rgba(48, 18, 10, 1) !important;
      }

      /* Galerie */
      .galerie {
        background: white !important;
        padding: 60px 40px !important;
      }

      .galerie-strip {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        padding: 0 !important;
      }

      .galerie-strip > img {
        width: 100% !important;
        height: 300px !important;
        object-fit: cover;
      }

      /* Outro / tagline */
      .outro {
        background: #FFEC99 !important;
        color: #30120A !important;
        padding: 80px 40px !important;
        text-align: center;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .outro h2 {
        font-size: 64px !important;
        line-height: 1 !important;
      }

      /* Club page */
      .club-hero {
        min-height: 100vh !important;
        background: linear-gradient(180deg, rgba(48,18,10,0.6), rgba(48,18,10,0.9)) !important;
        color: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .club-hero-bg {
        display: none;
      }

      .club-intro,
      .club-mouvement,
      .fondateurs {
        grid-template-columns: 1fr !important;
        gap: 40px;
      }

      .club-intro, .club-mouvement {
        padding: 60px 40px !important;
      }

      .fondateurs {
        background: #30120A !important;
        color: #F7F4EF !important;
        padding: 60px 40px !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .fondateurs-images {
        grid-template-columns: 1fr !important;
        gap: 20px;
      }

      .fondateurs-images img {
        break-inside: avoid;
      }

      /* Cours page detail */
      .cours-detail {
        grid-template-columns: 1fr !important;
        gap: 40px;
        padding: 60px 40px !important;
        border-top: none !important;
      }

      .cours-detail-img img {
        max-width: 400px;
        height: auto;
      }

      .cours-conseils {
        background: #F7F4EF !important;
        padding: 60px 40px !important;
      }

      .conseils-grid {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 20px;
      }

      /* Tarif page */
      .tarif-hero {
        min-height: 100vh !important;
        background: linear-gradient(180deg, rgba(48,18,10,0.5), rgba(48,18,10,0.9)) !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .tarif-unite {
        grid-template-columns: 1fr !important;
        padding: 60px 40px !important;
        gap: 40px;
      }

      .tarif-unite-img {
        max-height: 300px;
      }

      .packs {
        padding: 60px 40px !important;
      }

      .packs-table {
        break-inside: avoid;
      }

      .pack-row {
        break-inside: avoid;
        padding: 20px 24px !important;
      }

      .abonnements {
        background: #30120A !important;
        color: #F7F4EF !important;
        padding: 60px 40px !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .abos-grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      .offres-grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      .offre-card {
        break-inside: avoid;
      }

      .reservation {
        background: linear-gradient(180deg, rgba(48,18,10,0.8), rgba(48,18,10,0.95)) !important;
        padding: 60px 40px !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* Contact page */
      .contact-hero {
        padding: 60px 40px !important;
      }

      .contact-grid {
        grid-template-columns: 1fr !important;
        padding: 60px 40px !important;
        gap: 40px;
      }

      .contact-form {
        break-inside: avoid;
      }

      .coffee-banner {
        grid-template-columns: 1fr !important;
      }

      .coffee-banner-img {
        min-height: 300px;
      }

      .map-block {
        background: #30120A !important;
        padding: 60px 40px !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .map-frame {
        display: none;
      }

      /* Remove animations, transitions, hover effects */
      * {
        animation: none !important;
        transition: none !important;
      }

      a:hover { text-decoration: underline; }
      button { border: 1px solid currentColor; padding: 10px 20px; }

      /* Buttons styling for print */
      .btn {
        border: 1px solid #30120A !important;
        padding: 12px 24px !important;
        display: inline-block;
        margin: 12px 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .btn-primary {
        background: #30120A !important;
        color: #FFEC99 !important;
      }

      .btn-light {
        background: #FFEC99 !important;
        color: #30120A !important;
      }

      .btn-outline {
        background: transparent;
        color: #30120A;
      }

      /* Images & backgrounds */
      img {
        max-width: 100%;
        height: auto;
        break-inside: avoid;
      }

      /* Typography for print */
      h1, h2, h3, h4, h5, h6 {
        break-after: avoid;
        margin: 0 0 16px 0;
      }

      p {
        margin: 0 0 12px 0;
        orphans: 3;
        widows: 3;
      }

      /* No overflow */
      overflow: visible !important;
      overflow-x: visible !important;
      overflow-y: visible !important;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <div id="tweaks-root"></div>

  <script type="text/babel" src="components/shared.jsx"></script>
  <script type="text/babel" src="components/home.jsx"></script>
  <script type="text/babel" src="components/club.jsx"></script>
  <script type="text/babel" src="components/cours.jsx"></script>
  <script type="text/babel" src="components/tarifs.jsx"></script>
  <script type="text/babel" src="components/contact.jsx"></script>
  <script type="text/babel" src="components/tweaks.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "colorMarron": "#30120A",
      "colorMarronSoft": "#4a2a1e",
      "colorJaune": "#FFEC99",
      "colorBeige": "#F7F4EF",
      "colorBlanc": "#FBFAF5",
      "colorLine": "rgba(48,18,10,0.18)",
      "fontBody": "Manrope",
      "fontScript": "Zapfino",
      "bodyFontSize": 16,
      "heroFontSize": 72,
      "navLetterSpacing": 0.18,
      "btnRadius": 999,
      "cardRadius": 10,
      "cardShadow": false,
      "sectionPadding": 120,
      "containerMaxWidth": 1440,
      "heroOverlay": 0.55,
      "heroShowHours": false,
      "heroMinHeight": 100,
      "transitionSpeed": 0.3,
      "hoverZoom": 1.05,
      "showMarquee": true,
      "showGalerie": true,
      "showShop": true,
      "showStats": true,
      "showFondateurs": true,
      "coursColumns": 4,
      "footerDark": true,
      "navCompact": false,
      "navStyle": "transparent",
      "marqueeRunning": true
    }/*EDITMODE-END*/;

    window.__TWEAK_DEFAULTS__ = TWEAK_DEFAULTS;

    function TweaksHost() {
      const [visible, setVisible] = React.useState(false);

      React.useEffect(() => {
        const handler = (e) => {
          if (!e.data || !e.data.type) return;
          if (e.data.type === '__activate_edit_mode') {
            setVisible(true);
            document.body.classList.add('tweaks-open');
          }
          if (e.data.type === '__deactivate_edit_mode') {
            setVisible(false);
            document.body.classList.remove('tweaks-open');
          }
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      if (!visible) return null;
      return <TweaksPanel defaults={TWEAK_DEFAULTS} onClose={() => { setVisible(false); document.body.classList.remove('tweaks-open'); window.parent.postMessage({ type: '__deactivate_edit_mode' }, '*'); }} />;
    }

    function App() {
      const initial = (() => {
        try {
          const saved = localStorage.getItem('gaia-page');
          if (saved && ['home','club','cours','tarifs','contact'].includes(saved)) return saved;
        } catch (e) {}
        return 'home';
      })();
      const [page, setPageState] = React.useState(initial);
      const setPage = (p) => {
        setPageState(p);
        try { localStorage.setItem('gaia-page', p); } catch (e) {}
      };

      React.useEffect(() => {
        const handler = (e) => {
          if (!e.data || e.data.type !== '__edit_mode_set_keys') return;
          const v = e.data.edits;
          if (!v) return;
          const b = document.body;
          b.dataset.hideMarquee = v.showMarquee === false ? '1' : '';
          b.dataset.hideGalerie = v.showGalerie === false ? '1' : '';
          b.dataset.hideShop = v.showShop === false ? '1' : '';
          b.dataset.hideStats = v.showStats === false ? '1' : '';
          b.dataset.hideFondateurs = v.showFondateurs === false ? '1' : '';
          b.dataset.coursCols = v.coursColumns || 4;
          b.dataset.navCompact = v.navCompact ? '1' : '';
          document.documentElement.style.setProperty('--tw-hero-minheight', v.heroMinHeight || 100);
        };
        window.addEventListener('message', handler);
        return () => window.removeEventListener('message', handler);
      }, []);

      const navVariant = (page === 'home' || page === 'club' || page === 'tarifs') ? 'light' : 'solid';

      let PageEl = null;
      if (page === 'home') PageEl = <HomePage setPage={setPage} />;
      else if (page === 'club') PageEl = <ClubPage setPage={setPage} />;
      else if (page === 'cours') PageEl = <CoursPage setPage={setPage} />;
      else if (page === 'tarifs') PageEl = <TarifsPage setPage={setPage} />;
      else if (page === 'contact') PageEl = <ContactPage setPage={setPage} />;

      return (
        <>
          <Nav page={page} setPage={setPage} variant={navVariant} />
          <main key={page}>{PageEl}</main>
          <Footer setPage={setPage} />
        </>
      );
    }

    // Wait for fonts + React to settle, then auto-print
    React.useEffect = ((...args) => {
      const originalUseEffect = React.useEffect;
      return originalUseEffect(...args);
    })();

    setTimeout(() => {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
      ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<TweaksHost />);

      // Auto-print after 1 second (allow fonts + render)
      setTimeout(() => {
        window.print();
      }, 1000);
    }, 100);
  </script>
</body>
</html>
