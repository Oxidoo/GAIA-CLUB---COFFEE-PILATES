  .well {
    position: absolute;
    overflow: hidden;
    pointer-events: none;
  }

  .mask {
    position: absolute;
    inset: 0;
    background: #33150a;
    will-change: opacity, transform, filter;
  }

  /* Positions des lettres — précises */
  .w-g   { left: 36.932%; top: 27.720%; width: 6.494%; height: 39.468%; }
  .w-a1  { left: 43.912%; top: 27.720%; width: 6.899%; height: 39.468%; }
  .w-i   { left: 51.664%; top: 27.720%; width: 3.531%; height: 39.468%; }
  .w-a2  { left: 56.169%; top: 27.720%; width: 6.940%; height: 39.468%; }

  /* Tagline — puits ÉLARGI pour que le texte soit 100% caché
     même avec le translateY initial. On étend généreusement de chaque côté. */
  .w-tag {
    left: 35%;
    top: 67.3%;
    width: 30%;
    height: 6.7%;
  }

  /* Timeline 9s :
      6.7%-26.7%   G
     12.2%-32.2%   A1
     17.8%-37.8%   I
     23.3%-43.3%   A2
     43.3%-53%     pause — GAIA est posé, on le laisse respirer
     53%-68%       tagline
     68%-85%       hold complet
     85%-100%      fondu de boucle
  */

  @keyframes revealG {
    0%, 6.7%    { opacity: 1; transform: translateY(0%);    filter: blur(6px); }
    26.7%       { opacity: 0; transform: translateY(-100%); filter: blur(0); }
    85%         { opacity: 0; transform: translateY(-100%); filter: blur(0); }
    97%, 100%   { opacity: 1; transform: translateY(0%);    filter: blur(6px); }
  }
  @keyframes revealA1 {
    0%, 12.2%   { opacity: 1; transform: translateY(0%);    filter: blur(6px); }
    32.2%       { opacity: 0; transform: translateY(-100%); filter: blur(0); }
    85%         { opacity: 0; transform: translateY(-100%); filter: blur(0); }
    97%, 100%   { opacity: 1; transform: translateY(0%);    filter: blur(6px); }
  }
  @keyframes revealI {
    0%, 17.8%   { opacity: 1; transform: translateY(0%);    filter: blur(6px); }
    37.8%       { opacity: 0; transform: translateY(-100%); filter: blur(0); }
    85%         { opacity: 0; transform: translateY(-100%); filter: blur(0); }
    97%, 100%   { opacity: 1; transform: translateY(0%);    filter: blur(6px); }
  }
  @keyframes revealA2 {
    0%, 23.3%   { opacity: 1; transform: translateY(0%);    filter: blur(6px); }
    43.3%       { opacity: 0; transform: translateY(-100%); filter: blur(0); }
    85%         { opacity: 0; transform: translateY(-100%); filter: blur(0); }
    97%, 100%   { opacity: 1; transform: translateY(0%);    filter: blur(6px); }
  }
  /* Tagline : reste 100% opaque et en place jusqu'à 53% du cycle.
     Le masque ne bouge PAS avant ce moment — donc la tagline est
     totalement invisible pendant toute la séquence GAIA. */
  @keyframes revealTag {
    0%, 53%     { opacity: 1; transform: translateY(0%);    filter: blur(4px); }
    68%         { opacity: 0; transform: translateY(-50%);  filter: blur(0); }
    85%         { opacity: 0; transform: translateY(-50%);  filter: blur(0); }
    97%, 100%   { opacity: 1; transform: translateY(0%);    filter: blur(4px); }
  }

  .w-g   .mask { animation: revealG   9s cubic-bezier(0.16, 1, 0.3, 1) infinite; }
  .w-a1  .mask { animation: revealA1  9s cubic-bezier(0.16, 1, 0.3, 1) infinite; }
  .w-i   .mask { animation: revealI   9s cubic-bezier(0.16, 1, 0.3, 1) infinite; }
  .w-a2  .mask { animation: revealA2  9s cubic-bezier(0.16, 1, 0.3, 1) infinite; }
  .w-tag .mask { animation: revealTag 9s cubic-bezier(0.16, 1, 0.3, 1) infinite; }
</style>
</head>
<body>
  <div class="stage">
    <div class="frame">
      <div class="ref"></div>
      <div class="well w-g"><div class="mask"></div></div>
      <div class="well w-a1"><div class="mask"></div></div>
      <div class="well w-i"><div class="mask"></div></div>
      <div class="well w-a2"><div class="mask"></div></div>
      <div class="well w-tag"><div class="mask"></div></div>
    </div>
  </div>
</body>
